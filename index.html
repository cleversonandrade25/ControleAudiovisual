<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Sistema de Gestão Audiovisual</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --primary: #e94560;
            --secondary: #0f3460;
            --text: #eee;
            --text2: #aaa;
            --border: #2a2a4a;
            --success: #00c853;
            --warning: #ffd600;
            --danger: #ff1744;
            --info: #448aff;
            --ideia: #9b59b6;
            --desenv: #3498db;
            --preprod: #1abc9c;
            --prod: #e67e22;
            --posprod: #e74c3c;
            --aprov: #2ecc71;
            --pub: #f39c12;
            --gaveta: #7f8c8d;
            --result: #2980b9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
        }
        .header-stats span {
            background: var(--surface2);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text2);
        }
        .header-stats span strong {
            color: var(--text);
        }

        /* BOTÕES */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: #ff5a7a;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: var(--secondary);
            color: #fff;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* LAYOUT PRINCIPAL */
        .main-container {
            display: flex;
            height: calc(100vh - 65px);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
        }
        .sidebar-section {
            margin-bottom: 20px;
        }
        .sidebar-section h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text2);
            margin-bottom: 10px;
        }
        .stage-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .stage-item:hover {
            background: var(--surface2);
        }
        .stage-item.active {
            background: var(--surface2);
            border-color: var(--primary);
        }
        .stage-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .stage-count {
            margin-left: auto;
            background: var(--bg);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text2);
        }

        /* CONTENT AREA */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .content-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        /* CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(233, 68, 96, 0.1);
        }
        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.4;
        }
        .card-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--text2);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
        }
        .card-progress {
            margin-top: 10px;
        }
        .card-progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .card-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .card-progress-text {
            font-size: 0.7rem;
            color: var(--text2);
            text-align: right;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .tag {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--surface2);
            color: var(--text2);
        }
        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .priority-alta { background: var(--danger); }
        .priority-media { background: var(--warning); }
        .priority-baixa { background: var(--success); }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            z-index: 1;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* SEARCH */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: #000;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 999;
            animation: slideIn 0.3s, fadeOut 0.3s 2.5s forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 10px;
            }
            .sidebar .stage-item span:not(.stage-dot) {
                display: none;
            }
            .sidebar .stage-count {
                display: none;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .header-stats {
                display: none;
            }
        }

        /* ETAPA CORES */
        .stage-ideia { border-left: 4px solid var(--ideia); }
        .stage-desenv { border-left: 4px solid var(--desenv); }
        .stage-preprod { border-left: 4px solid var(--preprod); }
        .stage-prod { border-left: 4px solid var(--prod); }
        .stage-posprod { border-left: 4px solid var(--posprod); }
        .stage-aprov { border-left: 4px solid var(--aprov); }
        .stage-pub { border-left: 4px solid var(--pub); }
        .stage-gaveta { border-left: 4px solid var(--gaveta); }
        .stage-result { border-left: 4px solid var(--result); }

        .badge-ideia { background: rgba(155, 89, 182, 0.2); color: #c39bdb; }
        .badge-desenv { background: rgba(52, 152, 219, 0.2); color: #7db9e8; }
        .badge-preprod { background: rgba(26, 188, 156, 0.2); color: #5ee0c8; }
        .badge-prod { background: rgba(230, 126, 34, 0.2); color: #f0a860; }
        .badge-posprod { background: rgba(231, 76, 60, 0.2); color: #f08080; }
        .badge-aprov { background: rgba(46, 204, 113, 0.2); color: #6ee8a0; }
        .badge-pub { background: rgba(243, 156, 18, 0.2); color: #f7c060; }
        .badge-gaveta { background: rgba(127, 140, 141, 0.2); color: #b0b8b9; }
        .badge-result { background: rgba(41, 128, 185, 0.2); color: #6aaed9; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>🎬 Gestão Audiovisual</h1>
        <div class="header-stats">
            <span>📋 Total: <strong id="totalCount">0</strong></span>
            <span>✅ Aprovados: <strong id="aprovCount">0</strong></span>
            <span>📲 Publicados: <strong id="pubCount">0</strong></span>
        </div>
        <button class="btn btn-primary" onclick="abrirModalNovo()">+ Novo Conteúdo</button>
    </div>

    <!-- MAIN -->
    <div class="main-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>📋 Etapas do Fluxo</h3>
                <div class="stage-item active" data-stage="all" onclick="filtrarStage('all', this)">
                    📌 Todos os cards
                    <span class="stage-count" id="countAll">0</span>
                </div>
                <div class="stage-item" data-stage="ideia" onclick="filtrarStage('ideia', this)">
                    <span class="stage-dot" style="background:var(--ideia)"></span>
                    💡 Ideias
                    <span class="stage-count" id="countIdeia">0</span>
                </div>
                <div class="stage-item" data-stage="desenv" onclick="filtrarStage('desenv', this)">
                    <span class="stage-dot" style="background:var(--desenv)"></span>
                    📝 Desenvolvimento
                    <span class="stage-count" id="countDesenv">0</span>
                </div>
                <div class="stage-item" data-stage="preprod" onclick="filtrarStage('preprod', this)">
                    <span class="stage-dot" style="background:var(--preprod)"></span>
                    🎬 Pré-produção
                    <span class="stage-count" id="countPreprod">0</span>
                </div>
                <div class="stage-item" data-stage="prod" onclick="filtrarStage('prod', this)">
                    <span class="stage-dot" style="background:var(--prod)"></span>
                    🎥 Produção
                    <span class="stage-count" id="countProd">0</span>
                </div>
                <div class="stage-item" data-stage="posprod" onclick="filtrarStage('posprod', this)">
                    <span class="stage-dot" style="background:var(--posprod)"></span>
                    🎞 Pós-produção
                    <span class="stage-count" id="countPosprod">0</span>
                </div>
                <div class="stage-item" data-stage="aprov" onclick="filtrarStage('aprov', this)">
                    <span class="stage-dot" style="background:var(--aprov)"></span>
                    ✅ Aprovação
                    <span class="stage-count" id="countAprov">0</span>
                </div>
                <div class="stage-item" data-stage="pub" onclick="filtrarStage('pub', this)">
                    <span class="stage-dot" style="background:var(--pub)"></span>
                    📲 Publicação
                    <span class="stage-count" id="countPub">0</span>
                </div>
                <div class="stage-item" data-stage="gaveta" onclick="filtrarStage('gaveta', this)">
                    <span class="stage-dot" style="background:var(--gaveta)"></span>
                    📚 Gaveta
                    <span class="stage-count" id="countGaveta">0</span>
                </div>
                <div class="stage-item" data-stage="result" onclick="filtrarStage('result', this)">
                    <span class="stage-dot" style="background:var(--result)"></span>
                    📊 Resultados
                    <span class="stage-count" id="countResult">0</span>
                </div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="exportarDados()" style="width:100%">📥 Exportar Dados</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <div class="content-header">
                <h2 id="contentTitle">📌 Todos os Conteúdos</h2>
                <div style="display:flex;gap:8px">
                    <select id="filtroFormato" onchange="renderCards()" style="padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem">
                        <option value="">Todos os formatos</option>
                        <option value="Reels">Reels</option>
                        <option value="Stories">Stories</option>
                        <option value="YouTube">YouTube</option>
                        <option value="TikTok">TikTok</option>
                        <option value="Carrossel">Carrossel</option>
                        <option value="IGTV">IGTV</option>
                    </select>
                    <select id="filtroPrioridade" onchange="renderCards()" style="padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem">
                        <option value="">Todas prioridades</option>
                        <option value="alta">🔴 Alta</option>
                        <option value="media">🟡 Média</option>
                        <option value="baixa">🟢 Baixa</option>
                    </select>
                </div>
            </div>
            <div class="content-body">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por título, formato, categoria..." oninput="renderCards()">
                </div>
                <div class="cards-grid" id="cardsGrid">
                    <!-- Cards dinâmicos aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="fecharModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="fecharModal()">✕</button>
            <div id="modalInner">
                <!-- Conteúdo dinâmico -->
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast" style="display:none"></div>

    <script>
        // ============ DADOS ============
        const STAGES = {
            ideia: { nome: '💡 Ideias', cor: 'ideia', badge: 'badge-ideia', stageClass: 'stage-ideia' },
            desenv: { nome: '📝 Desenvolvimento', cor: 'desenv', badge: 'badge-desenv', stageClass: 'stage-desenv' },
            preprod: { nome: '🎬 Pré-produção', cor: 'preprod', badge: 'badge-preprod', stageClass: 'stage-preprod' },
            prod: { nome: '🎥 Produção', cor: 'prod', badge: 'badge-prod', stageClass: 'stage-prod' },
            posprod: { nome: '🎞 Pós-produção', cor: 'posprod', badge: 'badge-posprod', stageClass: 'stage-posprod' },
            aprov: { nome: '✅ Aprovação', cor: 'aprov', badge: 'badge-aprov', stageClass: 'stage-aprov' },
            pub: { nome: '📲 Publicação', cor: 'pub', badge: 'badge-pub', stageClass: 'stage-pub' },
            gaveta: { nome: '📚 Gaveta', cor: 'gaveta', badge: 'badge-gaveta', stageClass: 'stage-gaveta' },
            result: { nome: '📊 Resultados', cor: 'result', badge: 'badge-result', stageClass: 'stage-result' }
        };

        // Carregar dados do localStorage
        function carregarDados() {
            const dados = localStorage.getItem('audiovisual_cards');
            return dados ? JSON.parse(dados) : [];
        }

        function salvarDados(cards) {
            localStorage.setItem('audiovisual_cards', JSON.stringify(cards));
        }

        let cards = carregarDados();
        let stageFiltro = 'all';
        let cardEditando = null;

        // ============ DADOS INICIAIS DEMO ============
        if (cards.length === 0) {
            const dataAtual = new Date().toISOString().split('T')[0];
            cards = [
                {
                    id: Date.now() + 1,
                    titulo: 'Tutorial: Como usar o novo produto X',
                    formato: 'Reels',
                    categoria: 'Educativo',
                    prioridade: 'alta',
                    stage: 'ideia',
                    dataCriacao: dataAtual,
                    responsavel: 'Maria',
                    tags: ['#tutorial', '#produtoX'],
                    checklist: { sinopse: true, objetivo: false, estrutura: false, roteiro: false },
                    metricas: {},
                    descricao: 'Fazer um tutorial rápido mostrando as 3 principais funções do novo produto.'
                },
                {
                    id: Date.now() + 2,
                    titulo: 'Bastidores do evento anual',
                    formato: 'YouTube',
                    categoria: 'Bastidores',
                    prioridade: 'media',
                    stage: 'desenv',
                    dataCriacao: dataAtual,
                    responsavel: 'João',
                    tags: ['#bastidores', '#evento'],
                    checklist: { sinopse: true, objetivo: true, estrutura: true, roteiro: false },
                    metricas: {},
                    descricao: 'Mostrar os bastidores do evento, entrevistas rápidas com a equipe.'
                },
                {
                    id: Date.now() + 3,
                    titulo: 'Depoimento cliente satisfeito',
                    formato: 'Reels',
                    categoria: 'Vendas',
                    prioridade: 'alta',
                    stage: 'aprov',
                    dataCriacao: '2026-06-20',
                    responsavel: 'Ana',
                    tags: ['#depoimento', '#cliente'],
                    checklist: { sinopse: true, objetivo: true, estrutura: true, roteiro: true },
                    metricas: {},
                    descricao: 'Cliente falando sobre como nosso serviço ajudou ele.'
                },
                {
                    id: Date.now() + 4,
                    titulo: 'Dicas rápidas de produtividade',
                    formato: 'Stories',
                    categoria: 'Educativo',
                    prioridade: 'baixa',
                    stage: 'gaveta',
                    dataCriacao: '2026-05-15',
                    responsavel: 'Carlos',
                    tags: ['#dicas', '#produtividade'],
                    checklist: { sinopse: true, objetivo: true, estrutura: true, roteiro: true },
                    metricas: {},
                    descricao: '5 dicas rápidas em formato de stories, uma por slide.'
                },
                {
                    id: Date.now() + 5,
                    titulo: 'Lançamento coleção verão',
                    formato: 'Carrossel',
                    categoria: 'Vendas',
                    prioridade: 'media',
                    stage: 'pub',
                    dataCriacao: '2026-06-25',
                    responsavel: 'Maria',
                    tags: ['#lançamento', '#verão'],
                    checklist: { sinopse: true, objetivo: true, estrutura: true, roteiro: true },
                    metricas: { visualizacoes: 15200, curtidas: 2340, comentarios: 156, salvos: 890, compartilhamentos: 340, cliques: 1200 },
                    descricao: 'Apresentar a nova coleção de verão com fotos e preços.'
                }
            ];
            salvarDados(cards);
        }

        // ============ RENDER ============
        function getCardsFiltrados() {
            let filtrados = cards;
            if (stageFiltro !== 'all') {
                filtrados = filtrados.filter(c => c.stage === stageFiltro);
            }
            const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            if (search) {
                filtrados = filtrados.filter(c =>
                    c.titulo.toLowerCase().includes(search) ||
                    c.formato.toLowerCase().includes(search) ||
                    c.categoria.toLowerCase().includes(search) ||
                    (c.tags || []).some(t => t.toLowerCase().includes(search))
                );
            }
            const formato = document.getElementById('filtroFormato')?.value || '';
            if (formato) {
                filtrados = filtrados.filter(c => c.formato === formato);
            }
            const prioridade = document.getElementById('filtroPrioridade')?.value || '';
            if (prioridade) {
                filtrados = filtrados.filter(c => c.prioridade === prioridade);
            }
            return filtrados;
        }

        function getProgressoChecklist(card) {
            const items = Object.values(card.checklist || {});
            if (items.length === 0) return 0;
            const concluidos = items.filter(v => v === true).length;
            return Math.round((concluidos / items.length) * 100);
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const filtrados = getCardsFiltrados();

            if (filtrados.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <div class="icon">📭</div>
                        <h3>Nenhum conteúdo encontrado</h3>
                        <p>Crie um novo conteúdo ou ajuste os filtros.</p>
                        <button class="btn btn-primary" style="margin-top:16px" onclick="abrirModalNovo()">+ Criar Conteúdo</button>
                    </div>`;
            } else {
                grid.innerHTML = filtrados.map(card => {
                    const stage = STAGES[card.stage] || STAGES['ideia'];
                    const progresso = getProgressoChecklist(card);
                    const prioridadeClass = card.prioridade === 'alta' ? 'priority-alta' : card
                        .prioridade === 'media' ? 'priority-media' : 'priority-baixa';
                    const prioridadeEmoji = card.prioridade === 'alta' ? '🔴' : card.prioridade === 'media' ?
                        '🟡' : '🟢';

                    return `
                    <div class="card ${stage.stageClass}" onclick="abrirModalEditar(${card.id})">
                        <div class="card-header">
                            <span class="card-title">${card.titulo}</span>
                            <span class="card-badge ${stage.badge}">${stage.nome}</span>
                        </div>
                        <div class="card-meta">
                            <span>📹 ${card.formato}</span>
                            <span>📂 ${card.categoria}</span>
                            <span><span class="priority-dot ${prioridadeClass}"></span> ${prioridadeEmoji} ${card.prioridade}</span>
                        </div>
                        ${card.descricao ? `<p style="font-size:0.8rem;color:var(--text2);margin-bottom:8px;line-height:1.4">${card.descricao.substring(0, 100)}${card.descricao.length > 100 ? '...' : ''}</p>` : ''}
                        ${card.tags && card.tags.length > 0 ? `
                        <div class="card-tags">${card.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                        <div class="card-progress">
                            <div class="card-progress-bar">
                                <div class="card-progress-fill" style="width:${progresso}%;background:var(--${stage.cor})"></div>
                            </div>
                            <div class="card-progress-text">📋 ${progresso}% concluído</div>
                        </div>
                        <div class="card-meta" style="margin-top:8px">
                            <span>👤 ${card.responsavel || '—'}</span>
                            <span>📅 ${card.dataCriacao || '—'}</span>
                        </div>
                        <div class="card-actions" onclick="event.stopPropagation()">
                            ${getProximoStageBtn(card)}
                            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();moverParaGaveta(${card.id})">📚 Gaveta</button>
                            <button class="btn btn-sm btn-outline" style="color:var(--danger);border-color:var(--danger)" onclick="event.stopPropagation();excluirCard(${card.id})">🗑</button>
                        </div>
                    </div>`;
                }).join('');
            }
            atualizarContadores();
        }

        function getProximoStageBtn(card) {
            const ordem = ['ideia', 'desenv', 'preprod', 'prod', 'posprod', 'aprov', 'pub', 'result'];
            const idx = ordem.indexOf(card.stage);
            if (idx >= 0 && idx < ordem.length - 1) {
                const next = ordem[idx + 1];
                return `<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();moverStage(${card.id},'${next}')">➡ ${STAGES[next].nome}</button>`;
            }
            return '';
        }

        function moverStage(id, novoStage) {
            const card = cards.find(c => c.id === id);
            if (card) {
                card.stage = novoStage;
                salvarDados(cards);
                renderCards();
                mostrarToast(`✅ Movido para: ${STAGES[novoStage].nome}`);
            }
        }

        function moverParaGaveta(id) {
            const card = cards.find(c => c.id === id);
            if (card && card.stage !== 'gaveta') {
                card.stage = 'gaveta';
                salvarDados(cards);
                renderCards();
                mostrarToast('📚 Conteúdo movido para a Gaveta!');
            }
        }

        function excluirCard(id) {
            if (confirm('Tem certeza que deseja excluir este conteúdo? Esta ação não pode ser desfeita.')) {
                cards = cards.filter(c => c.id !== id);
                salvarDados(cards);
                renderCards();
                mostrarToast('🗑 Conteúdo excluído!');
            }
        }

        function atualizarContadores() {
            const counts = {};
            ['all', ...Object.keys(STAGES)].forEach(s => {
                counts[s] = s === 'all' ? cards.length : cards.filter(c => c.stage === s).length;
            });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('totalCount').textContent = counts.all;
            Object.keys(STAGES).forEach(s => {
                const el = document.getElementById('count' + s.charAt(0).toUpperCase() + s.slice(1));
                if (el) el.textContent = counts[s];
            });
            document.getElementById('aprovCount').textContent = counts.aprov;
            document.getElementById('pubCount').textContent = counts.pub;
        }

        // ============ FILTRO ============
        function filtrarStage(stage, el) {
            stageFiltro = stage;
            document.querySelectorAll('.stage-item').forEach(item => item.classList.remove('active'));
            if (el) el.classList.add('active');
            document.getElementById('contentTitle').textContent = stage === 'all' ? '📌 Todos os Conteúdos' : STAGES[stage]
                .nome + ' (' + cards.filter(c => c.stage === stage).length + ')';
            renderCards();
        }

        // ============ MODAL ============
        function abrirModalNovo() {
            cardEditando = null;
            document.getElementById('modalInner').innerHTML = getFormHTML(null);
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function abrirModalEditar(id) {
            cardEditando = id;
            const card = cards.find(c => c.id === id);
            document.getElementById('modalInner').innerHTML = getFormHTML(card);
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function fecharModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').style.display = 'none';
                cardEditando = null;
            }
        }

        function getFormHTML(card) {
            const isEdit = card !== null;
            const titulo = card ? card.titulo : '';
            const formato = card ? card.formato : 'Reels';
            const categoria = card ? card.categoria : 'Educativo';
            const prioridade = card ? card.prioridade : 'media';
            const stage = card ? card.stage : 'ideia';
            const responsavel = card ? card.responsavel : '';
            const dataCriacao = card ? card.dataCriacao : new Date().toISOString().split('T')[0];
            const descricao = card ? card.descricao : '';
            const tags = card && card.tags ? card.tags.join(', ') : '';
            const checklist = card ? card.checklist : { sinopse: false, objetivo: false, estrutura: false,
                roteiro: false };
            const metricas = card ? card.metricas : {};

            return `
            <h2>${isEdit ? '✏️ Editar Conteúdo' : '➕ Novo Conteúdo'}</h2>
            <form onsubmit="salvarCard(event, ${isEdit ? card.id : 'null'})">
                <div class="form-row">
                    <div class="form-group">
                        <label>Título *</label>
                        <input type="text" id="formTitulo" value="${titulo}" required placeholder="Nome do conteúdo">
                    </div>
                    <div class="form-group">
                        <label>Formato</label>
                        <select id="formFormato">
                            ${['Reels','Stories','YouTube','TikTok','Carrossel','IGTV','Feed','LinkedIn'].map(f => `<option value="${f}" ${f === formato ? 'selected' : ''}>${f}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="formCategoria">
                            ${['Educativo','Entretenimento','Bastidores','Vendas','Institucional','Tendência','Depoimento'].map(c => `<option value="${c}" ${c === categoria ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Prioridade</label>
                        <select id="formPrioridade">
                            <option value="alta" ${prioridade === 'alta' ? 'selected' : ''}>🔴 Alta</option>
                            <option value="media" ${prioridade === 'media' ? 'selected' : ''}>🟡 Média</option>
                            <option value="baixa" ${prioridade === 'baixa' ? 'selected' : ''}>🟢 Baixa</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Etapa Atual</label>
                        <select id="formStage">
                            ${Object.entries(STAGES).map(([k,v]) => `<option value="${k}" ${k === stage ? 'selected' : ''}>${v.nome}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Responsável</label>
                        <input type="text" id="formResponsavel" value="${responsavel}" placeholder="Nome do responsável">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Data de Criação</label>
                        <input type="date" id="formDataCriacao" value="${dataCriacao}">
                    </div>
                    <div class="form-group">
                        <label>Tags (separadas por vírgula)</label>
                        <input type="text" id="formTags" value="${tags}" placeholder="#tutorial, #produtoX">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descrição / Sinopse</label>
                    <textarea id="formDescricao" rows="3" placeholder="Descreva a ideia, objetivo e estrutura...">${descricao}</textarea>
                </div>

                <h3 style="margin-top:20px;margin-bottom:12px;font-size:0.9rem;color:var(--text2)">📋 CHECKLIST DA ETAPA</h3>
                <div class="checkbox-list">
                    <label class="checkbox-item"><input type="checkbox" id="chkSinopse" ${checklist.sinopse ? 'checked' : ''}> Sinopse / Resumo (3-5 linhas)</label>
                    <label class="checkbox-item"><input type="checkbox" id="chkObjetivo" ${checklist.objetivo ? 'checked' : ''}> Objetivo definido</label>
                    <label class="checkbox-item"><input type="checkbox" id="chkEstrutura" ${checklist.estrutura ? 'checked' : ''}> Estrutura narrativa</label>
                    <label class="checkbox-item"><input type="checkbox" id="chkRoteiro" ${checklist.roteiro ? 'checked' : ''}> Roteiro finalizado</label>
                </div>

                ${card && card.stage === 'pub' ? `
                <h3 style="margin-top:20px;margin-bottom:12px;font-size:0.9rem;color:var(--text2)">📊 MÉTRICAS</h3>
                <div class="form-row">
                    <div class="form-group"><label>Visualizações</label><input type="number" id="metVisualizacoes" value="${metricas.visualizacoes || 0}"></div>
                    <div class="form-group"><label>Curtidas</label><input type="number" id="metCurtidas" value="${metricas.curtidas || 0}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Comentários</label><input type="number" id="metComentarios" value="${metricas.comentarios || 0}"></div>
                    <div class="form-group"><label>Salvos</label><input type="number" id="metSalvos" value="${metricas.salvos || 0}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Compartilhamentos</label><input type="number" id="metCompartilhamentos" value="${metricas.compartilhamentos || 0}"></div>
                    <div class="form-group"><label>Cliques no Link</label><input type="number" id="metCliques" value="${metricas.cliques || 0}"></div>
                </div>
                ` : ''}

                <div style="display:flex;gap:10px;margin-top:24px;justify-content:flex-end">
                    <button type="button" class="btn btn-outline" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">💾 ${isEdit ? 'Salvar Alterações' : 'Criar Conteúdo'}</button>
                </div>
            </form>`;
        }

        function salvarCard(event, id) {
            event.preventDefault();
            const dados = {
                titulo: document.getElementById('formTitulo').value,
                formato: document.getElementById('formFormato').value,
                categoria: document.getElementById('formCategoria').value,
                prioridade: document.getElementById('formPrioridade').value,
                stage: document.getElementById('formStage').value,
                responsavel: document.getElementById('formResponsavel').value,
                dataCriacao: document.getElementById('formDataCriacao').value,
                tags: document.getElementById('formTags').value.split(',').map(t => t.trim()).filter(t => t),
                descricao: document.getElementById('formDescricao').value,
                checklist: {
                    sinopse: document.getElementById('chkSinopse').checked,
                    objetivo: document.getElementById('chkObjetivo').checked,
                    estrutura: document.getElementById('chkEstrutura').checked,
                    roteiro: document.getElementById('chkRoteiro').checked,
                },
                metricas: {}
            };

            // Coletar métricas se existirem
            const metVisualizacoes = document.getElementById('metVisualizacoes');
            if (metVisualizacoes) {
                dados.metricas = {
                    visualizacoes: parseInt(metVisualizacoes.value) || 0,
                    curtidas: parseInt(document.getElementById('metCurtidas')?.value) || 0,
                    comentarios: parseInt(document.getElementById('metComentarios')?.value) || 0,
                    salvos: parseInt(document.getElementById('metSalvos')?.value) || 0,
                    compartilhamentos: parseInt(document.getElementById('metCompartilhamentos')?.value) || 0,
                    cliques: parseInt(document.getElementById('metCliques')?.value) || 0,
                };
            }

            if (id) {
                const idx = cards.findIndex(c => c.id === id);
                if (idx >= 0) {
                    cards[idx] = { ...cards[idx], ...dados };
                }
                mostrarToast('✅ Conteúdo atualizado com sucesso!');
            } else {
                cards.push({ ...dados, id: Date.now() });
                mostrarToast('🎉 Novo conteúdo criado!');
            }

            salvarDados(cards);
            document.getElementById('modalOverlay').style.display = 'none';
            cardEditando = null;
            renderCards();
        }

        // ============ TOAST ============
        function mostrarToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.animation = 'none';
            toast.offsetHeight;
            toast.style.animation = 'slideIn 0.3s, fadeOut 0.3s 2.5s forwards';
            setTimeout(() => { toast.style.display = 'none'; }, 2800);
        }

        // ============ EXPORTAR ============
        function exportarDados() {
            const dados = JSON.stringify(cards, null, 2);
            const blob = new Blob([dados], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_audiovisual_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            mostrarToast('📥 Dados exportados com sucesso!');
        }

        // ============ TECLAS ============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('modalOverlay').style.display = 'none';
                cardEditando = null;
            }
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                abrirModalNovo();
            }
        });

        // ============ INIT ============
        renderCards();

        console.log('🎬 Sistema de Gestão Audiovisual carregado!');
        console.log('📋 ' + cards.length + ' conteúdos no sistema');
        console.log('💡 Dicas:');
        console.log('  - Clique em "+ Novo Conteúdo" ou Ctrl+N para criar');
        console.log('  - Clique em qualquer card para editar');
        console.log('  - Use os botões "➡" para avançar etapas');
        console.log('  - Use "📚 Gaveta" para arquivar');
        console.log('  - Os dados salvam automaticamente no navegador');
    </script>
</body>
</html>
